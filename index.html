<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>準食 · On-Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F5F0E8;--cream2:#EDE6D6;--cream3:#D8CDB8;--brown:#8B6F47;--brown2:#6B5035;--brown3:#4A3520;--muted:#9E8A6F;--light:#C4B49A;--white:#FAF7F2;--warn:#C4702A;}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream2);color:var(--brown3);}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--cream);}
@media(min-width:768px){
  body{background:var(--cream2);}
  #root{max-width:1280px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.12);}
}
.scroll-body{flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch;}
.page-footer{flex-shrink:0;background:var(--white);border-top:1px solid var(--cream3);padding:12px 16px;}
.footer-row{display:flex;gap:8px;}
.btn-primary{display:block;width:100%;background:var(--brown3);color:var(--white);border:none;border-radius:8px;padding:13px;font-size:13px;font-family:'Jost',sans-serif;letter-spacing:0.06em;cursor:pointer;text-align:center;transition:background 0.15s;}
.btn-primary:hover{background:var(--brown2);}
.btn-secondary{padding:13px 18px;border:1.5px solid var(--brown3);border-radius:8px;background:none;color:var(--brown3);font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
.btn-secondary:hover{background:var(--cream2);}
/* Header */
.hdr{flex-shrink:0;background:var(--white);border-bottom:1px solid var(--cream3);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
.logo{cursor:pointer;}
.logo-main{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--brown3);letter-spacing:0.05em;line-height:1.2;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lang-btn{width:42px;height:28px;font-size:11px;font-weight:500;color:var(--brown3);border:1.5px solid var(--brown3);border-radius:6px;background:none;cursor:pointer;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.lang-btn:hover{background:var(--cream2);}
.cart-pill{display:flex;align-items:center;gap:6px;background:var(--brown3);color:var(--white);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;transition:background 0.15s;}
.cart-pill:hover{background:var(--brown2);}
.cart-dot{width:17px;height:17px;border-radius:50%;background:var(--warn);color:white;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:500;}
/* Banner */
.banner{background:var(--cream2);border-bottom:1px solid var(--cream3);padding:24px 20px 20px;}
.banner-tag{display:inline-block;font-size:10px;letter-spacing:0.14em;color:var(--muted);border:1px solid var(--light);border-radius:20px;padding:3px 10px;margin-bottom:10px;text-transform:uppercase;}
.banner-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--brown3);margin-bottom:6px;line-height:1.4;}
@media(min-width:768px){.banner-title{font-size:26px;}}
.banner-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.deadline{background:var(--brown3);color:var(--cream);font-size:10px;padding:3px 10px;border-radius:20px;}
/* Tabs */
.cat-tabs{display:flex;border-bottom:1px solid var(--cream3);background:var(--white);}
.cat-tab{flex:1;padding:12px 8px;font-size:12px;font-weight:400;color:var(--brown3);border:none;background:none;cursor:pointer;font-family:'Jost',sans-serif;border-bottom:2px solid transparent;transition:all 0.15s;text-align:center;}
.cat-tab.active{background:var(--brown3);color:var(--white);border-bottom-color:var(--brown3);font-weight:500;}
.cat-tab:not(.active):hover{background:var(--cream2);}
/* Products */
.sec-label{font-size:10px;letter-spacing:0.14em;color:var(--muted);padding:14px 20px 6px;text-transform:uppercase;}
.prod-list{padding:0 12px 16px;}
@media(min-width:768px){.prod-list{padding:0 16px 20px;}}
.prod-card{display:flex;gap:12px;padding:12px 8px;border-bottom:1px solid var(--cream3);background:var(--white);border-radius:10px;margin-bottom:8px;align-items:center;}
.prod-img{width:72px;height:72px;border-radius:8px;background:var(--cream2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;}
@media(min-width:768px){.prod-img{width:80px;height:80px;}}
.prod-body{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:500;color:var(--brown3);margin-bottom:2px;}
.prod-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.prod-price{font-size:15px;color:var(--brown2);font-family:'Cormorant Garamond',serif;font-weight:500;}
.prod-unit{font-size:11px;color:var(--muted);font-family:'Jost',sans-serif;font-weight:300;}
.sold-badge{font-size:10px;color:var(--brown2);background:var(--cream2);border:1px solid var(--cream3);padding:4px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--brown3);border-radius:20px;overflow:hidden;flex-shrink:0;background:var(--white);}
.qty-btn{width:30px;height:30px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--brown3);display:flex;align-items:center;justify-content:center;transition:background 0.12s;}
.qty-btn:hover{background:var(--cream2);}
.qty-n{min-width:24px;text-align:center;font-size:13px;font-weight:500;color:var(--brown3);}
/* Mobile shop footer */
#shopFooter{display:none;}
/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(44,31,14,0);z-index:100;pointer-events:none;transition:background 0.3s;}
.drawer-overlay.open{background:rgba(44,31,14,0.4);pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,92vw);background:var(--white);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.08);}
.drawer.open{transform:translateX(0);}
.drawer-hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;border-bottom:1px solid var(--cream3);}
.drawer-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--brown3);}
.drawer-close{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:20px;color:var(--muted);display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.15s;}
.drawer-close:hover{background:var(--cream2);}
.drawer-scroll{flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch;}
.drawer-footer{flex-shrink:0;background:var(--white);border-top:1px solid var(--cream3);padding:12px 20px;}
/* Step indicator */
.steps-wrap{padding:16px 20px 4px;flex-shrink:0;}
.steps-track{display:flex;align-items:center;}
.step-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0;}
.step-dot.done{background:var(--brown3);border-color:var(--brown3);color:var(--white);}
.step-dot.active{border-color:var(--brown3);color:var(--brown3);font-weight:700;}
.step-line{flex:1;height:1px;background:var(--cream3);}
.step-line.done{background:var(--brown3);}
.steps-labels{display:flex;align-items:flex-start;margin-top:6px;padding-bottom:8px;}
.slbl-dot{width:24px;flex-shrink:0;display:flex;justify-content:center;overflow:visible;}
.slbl-dot span{font-size:9px;color:var(--muted);white-space:nowrap;display:block;text-align:center;transform:translateX(-50%);margin-left:50%;}
.slbl-dot span.active{color:var(--brown3);font-weight:500;}
.slbl-space{flex:1;}
/* Cart content */
.cart-wrap{padding:14px 20px 12px;}
.section-head{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--brown3);margin-bottom:12px;}
.ci-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--cream3);}
.ci-name{font-size:13px;font-weight:500;color:var(--brown3);}
.ci-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ci-price{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--brown2);}
.dlv-block{margin:16px 0 10px;}
.dlv-label{font-size:10px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.dlv-opts{display:flex;gap:8px;margin-bottom:12px;}
.dlv-opt{flex:1;border:1.5px solid var(--cream3);border-radius:10px;padding:12px 10px;cursor:pointer;background:var(--cream);font-family:'Jost',sans-serif;text-align:left;transition:border-color 0.15s;}
.dlv-opt.sel{border-color:var(--brown3);background:var(--cream2);}
.dlv-opt:not(.sel):hover{border-color:var(--brown);}
.dlv-opt-name{font-size:13px;font-weight:500;color:var(--brown3);}
.dlv-opt-fee{font-size:11px;color:var(--muted);margin-top:3px;}
.day-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.day-chip{padding:7px 16px;border:1.5px solid var(--cream3);border-radius:20px;font-size:12px;font-family:'Jost',sans-serif;color:var(--brown3);background:var(--cream);cursor:pointer;transition:all 0.15s;}
.day-chip.sel{border-color:var(--brown3);background:var(--cream2);font-weight:500;}
.day-chip:not(.sel):hover{border-color:var(--brown);}
.station-grid{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.station-card{border:1.5px solid var(--cream3);border-radius:8px;padding:10px 14px;cursor:pointer;background:var(--cream);transition:border-color 0.15s;display:flex;justify-content:space-between;align-items:center;}
.station-card.sel{border-color:var(--brown3);background:var(--cream2);}
.station-card:not(.sel):hover{border-color:var(--brown);}
.station-name{font-size:13px;font-weight:500;color:var(--brown3);}
.station-time{font-size:11px;color:var(--muted);}
.total-rows{padding:10px 0 2px;}
.t-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--muted);}
.t-row.main{font-size:16px;color:var(--brown3);font-family:'Cormorant Garamond',serif;font-weight:500;padding-top:10px;margin-top:6px;border-top:1px solid var(--cream3);}
.discount-block{margin-top:16px;}
.discount-row{display:flex;gap:8px;}
.discount-row .f-input{margin-bottom:0;flex:1;text-transform:uppercase;}
.discount-apply{padding:10px 16px;background:var(--brown3);color:var(--white);border:none;border-radius:8px;font-size:12px;font-family:'Jost',sans-serif;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.discount-apply:hover{background:var(--brown2);}
.order-mini{background:var(--cream2);border:1px solid var(--cream3);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.order-mini-title{font-size:10px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.order-mini-row{display:flex;justify-content:space-between;font-size:12px;color:var(--brown3);padding:2px 0;}
.order-mini-total{display:flex;justify-content:space-between;font-size:13px;font-weight:500;color:var(--brown3);padding-top:6px;margin-top:4px;border-top:1px solid var(--cream3);}
.f-label{font-size:10px;letter-spacing:0.1em;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;}
.f-input{width:100%;padding:11px 12px;border:1.5px solid var(--cream3);border-radius:8px;font-size:14px;font-family:'Jost',sans-serif;background:var(--cream);color:var(--brown3);outline:none;transition:border-color 0.15s;margin-bottom:12px;}
.f-input:focus{border-color:var(--brown3);}
.f-input::placeholder{color:var(--light);}
.f-err{display:none;font-size:10px;color:var(--warn);margin:-8px 0 8px;}
.bank-box{background:var(--cream2);border:1px solid var(--cream3);border-radius:10px;padding:14px;margin-bottom:14px;}
.bank-title{font-size:10px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.bank-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--cream3);}
.bank-row:last-of-type{border-bottom:none;}
.bank-k{color:var(--muted);}
.bank-v{font-weight:500;color:var(--brown3);}
.amt-due-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 2px;border-top:1px solid var(--cream3);margin-top:6px;}
.amt-due-label{font-size:12px;color:var(--muted);}
.amt-due-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--warn);}
.note{font-size:11px;color:var(--muted);background:var(--cream2);border-radius:8px;padding:10px 14px;margin:10px 0;line-height:1.7;}
.success{padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.s-icon{width:54px;height:54px;border-radius:50%;background:var(--cream2);border:1px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px;}
.s-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--brown3);margin-bottom:8px;}
.s-sub{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:16px;white-space:pre-line;}
.done-actions{display:flex;gap:10px;width:100%;}
.done-actions a,.done-actions button{flex:1;}
</style>
</head>
<body>
<!-- Loading screen -->
<div id="loadingScreen" style="position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--brown3);">準食</div>
  <div style="font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-top:-8px;">on-time food</div>
  <div style="width:32px;height:32px;border:2px solid var(--cream3);border-top-color:var(--brown3);border-radius:50%;animation:spin 0.8s linear infinite;margin-top:8px;"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<div id="root">
  <div class="hdr">
    <div class="logo" onclick="goHome()">
      <div class="logo-main">準食</div>
      <div class="logo-sub">on-time food</div>
    </div>
    <div class="hdr-right">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
      <button class="cart-pill" onclick="openDrawer()">
        <span id="cartLabel">購物車</span>
        <div class="cart-dot" id="cartDot">0</div>
      </button>
    </div>
  </div>
  <div class="scroll-body">
    <div class="banner">
      <div class="banner-tag" id="b-tag">本週上架 · WEEK 12</div>
      <div class="banner-title" id="b-title">精選食材，新鮮直送</div>
      <div class="banner-meta">
        <span id="b-date">2025 年 3 月 18 日</span>
        <span class="deadline" id="b-deadline">週二 23:59 截單</span>
      </div>
    </div>
    <div class="cat-tabs">
      <button class="cat-tab active" onclick="setTab(0,'frozen')" id="tab0">❄ 冷凍食品</button>
      <button class="cat-tab" onclick="setTab(1,'fresh')" id="tab1">🌿 現做食品</button>
    </div>
    <div id="sec-frozen">
      <div class="sec-label" id="sl1">冷凍 · 隨時可下單</div>
      <div class="prod-list" id="list-frozen"></div>
    </div>
    <div id="sec-fresh" style="display:none;">
      <div class="sec-label" id="sl2">現做 · 本週六自取</div>
      <div class="prod-list" id="list-fresh"></div>
    </div>
  </div>
  <div class="page-footer" id="shopFooter">
    <button class="btn-primary" onclick="openDrawer()" id="shopCtaBtn">前往購物車</button>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <div class="drawer-title" id="drawerTitle">購物車</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-scroll" id="drawer-scroll"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8OR1HMrdynSqtOSvOlIEvYqkvbHZqxKtysDl78Goqx0sf1YTHFh4oGTcMpaJTZ1vW7w/exec'; // ← 換成你的 Apps Script URL

}

var products = []; // loaded from Google Sheet
var productsLoaded = false;
var cart={};
function hasFresh(){return Object.keys(cart).some(function(id){return products.find(function(p){return p.id==id&&p.cat==='fresh';});});}
function t(k){return T[lang][k]||'';}
function cartCount(){return Object.values(cart).reduce(function(s,v){return s+v;},0);}
function sub(){return products.reduce(function(s,p){return s+(cart[p.id]||0)*p.price;},0);}
function fee(){return dlvMode==='deliver'?10:0;}
function tot(){var base=sub()+fee();if(discountPct>0)base=base*(1-discountPct/100);return base;}
function fmt(n){return '£'+n.toFixed(2);}

function openDrawer(){drawerOpen=true;step='cart';document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');document.body.style.overflow='hidden';renderDrawer();}
function closeDrawer(){drawerOpen=false;document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');document.body.style.overflow='';}
function goHome(){closeDrawer();}

function buildSteps(current){
  var ci=STEP_ORDER.indexOf(current),labels=LABELS[lang],d='',l='';
  for(var i=0;i<4;i++){
    var isDone=i<ci,isActive=i===ci;
    if(i>0) d+='<div class="step-line '+(i<=ci?'done':'')+'"></div>';
    d+='<div class="step-dot '+(isDone?'done':isActive?'active':'')+'">'+(isDone?'✓':i+1)+'</div>';
  }
  for(var j=0;j<4;j++){
    if(j>0) l+='<div class="slbl-space"></div>';
    l+='<div class="slbl-dot"><span class="'+(j===ci?'active':'')+'">'+labels[j]+'</span></div>';
  }
  return '<div class="steps-wrap"><div class="steps-track">'+d+'</div><div class="steps-labels">'+l+'</div></div>';
}
function orderMini(){
  var items=products.filter(function(p){return (cart[p.id]||0)>0;});
  var isFr=hasFresh(),st=selStation?ALL_STATIONS.find(function(s){return s.id===selStation;}):null;
  var days=availableDays(isFr),dayObj=selDay?days.find(function(d){return d.key===selDay;}):null,dayLabel=dayObj?dayObj.label:'';
  var html='<div class="order-mini"><div class="order-mini-title">'+t('orderSummary')+'</div>';
  items.forEach(function(p){html+='<div class="order-mini-row"><span>'+p.name[lang]+' × '+cart[p.id]+'</span><span>'+fmt(cart[p.id]*p.price)+'</span></div>';});
  if(dlvMode==='deliver') html+='<div class="order-mini-row"><span>'+t('deliver')+'</span><span>'+fmt(fee())+'</span></div>';
  if(st&&dayLabel) html+='<div class="order-mini-row" style="color:var(--muted);font-size:11px;"><span>'+t('pickup')+' · '+dayLabel+' · '+st.name[lang]+'</span><span>'+st.time+'</span></div>';
  if(discountPct>0){var base=sub()+fee();html+='<div class="order-mini-row" style="color:var(--brown2);"><span>'+(lang==='zh'?'折扣碼 · ':'Code · ')+discountCode+'</span><span>- '+fmt(base*(discountPct/100))+'</span></div>';}
  html+='<div class="order-mini-total"><span>'+t('total')+'</span><span>'+fmt(tot())+'</span></div></div>';
  return html;
}
function applyDiscount(){
  var inp=document.getElementById('discount_code'),msg=document.getElementById('discount-msg');
  if(!inp||!msg) return;
  var code=inp.value.trim().toUpperCase();
  if(!code){msg.style.display='none';return;}
  if(VALID_CODES[code]!==undefined){discountCode=code;discountPct=VALID_CODES[code];msg.style.color='var(--brown2)';msg.textContent=t('discountOk')+discountPct+'%';msg.style.display='block';renderDrawer();}
  else{discountCode='';discountPct=0;msg.style.color='var(--warn)';msg.textContent=t('discountFail');msg.style.display='block';}
}

function setTab(i,tab){

  document.getElementById('sec-frozen').style.display=tab==='frozen'?'block':'none';
  document.getElementById('sec-fresh').style.display=tab==='fresh'?'block':'none';
}
function setQty(id,v){
  if(v<=0) delete cart[id]; else cart[id]=v;
  var days=availableDays(hasFresh());
  if(selDay&&!days.find(function(d){return d.key===selDay;})) selDay='';
  updateHeader();renderProducts();
  var f=document.getElementById('shopFooter');
  if(f) f.style.display=cartCount()>0?'block':'none';
  var btn=document.getElementById('shopCtaBtn');
  if(btn) btn.textContent=t('goCart')+' ('+cartCount()+')';
  if(drawerOpen) renderDrawer();
}
function updateHeader(){
  document.getElementById('cartDot').textContent=cartCount();

function renderProducts(){
  ['frozen','fresh'].forEach(function(cat){
    var el=document.getElementById('list-'+cat);if(!el)return;
    el.innerHTML=products.filter(function(p){return p.cat===cat;}).map(function(p){
      return '<div class="prod-card"><div class="prod-img">'+p.emoji+'</div><div class="prod-body"><div class="prod-name">'+p.name[lang]+'</div><div class="prod-desc">'+p.desc[lang]+'</div><div class="prod-price">'+fmt(p.price)+' <span class="prod-unit">/ '+p.unit[lang]+'</span></div></div>'

}

function validateCart(){

  if(dlvMode==='pickup'){

    if(selDay&&!selStation){if(stErr) stErr.style.display='block';ok=false;}else{if(stErr) stErr.style.display='none';}
  }
  if(ok) goStep('contact');
}

  function setErr(iid,eid,msg,invalid){var el=document.getElementById(iid),errEl=document.getElementById(eid);if(!el||!errEl)return;if(invalid){el.style.borderColor='var(--warn)';errEl.textContent=msg;errEl.style.display='block';ok=false;}else{el.style.borderColor='';errEl.style.display='none';}}
  var name=document.getElementById('f_name'),phone=document.getElementById('f_phone'),email=document.getElementById('f_email'),addr=document.getElementById('f_addr');
  setErr('f_name','err_name',t('errReq'),!name||!name.value.trim());
  setErr('f_phone','err_phone',t('errPhone'),!phone||!/^[+\d][\d\s\-()+]{6,}$/.test(phone.value.trim()));
  setErr('f_email','err_email',t('errEmail'),!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim()));
  if(addr) setErr('f_addr','err_addr',t('errReq'),!addr.value.trim());
  if(ok){
    savedFormData = {
      name:     document.getElementById('f_name').value.trim(),
      phone:    document.getElementById('f_phone').value.trim(),
      email:    document.getElementById('f_email').value.trim(),
      whatsapp: document.getElementById('f_wa') ? document.getElementById('f_wa').value.trim() : '',
      address:  document.getElementById('f_addr') ? document.getElementById('f_addr').value.trim() : '',
    };
    goStep('payment');
  }
}
// Store contact form data between steps
var savedFormData = {};

function validatePayment(){
  var acc=document.getElementById('f_acc5'),errEl=document.getElementById('err_acc5');
  if(!acc||!acc.value.trim()){if(acc)acc.style.borderColor='var(--warn)';if(errEl){errEl.textContent=t('errReq');errEl.style.display='block';}return;}

  showLoading(true);

  // If no URL set, use demo products
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    products = [
      {id:'1',cat:'frozen',name:{zh:'手工煎餃（豬肉高麗菜）',en:'Pan-fried Dumplings'},desc:{zh:'每包 10 粒，冷凍保存',en:'10 pcs per pack, frozen'},price:8.5,unit:{zh:'包',en:'pack'},stock:true,emoji:'🥟',imageUrl:''},
      {id:'2',cat:'frozen',name:{zh:'紅燒牛肉麵湯底',en:'Braised Beef Noodle Broth'},desc:{zh:'2人份，加麵即可上桌',en:'Serves 2, just add noodles'},price:12,unit:{zh:'份',en:'portion'},stock:true,emoji:'🍲',imageUrl:''},
      {id:'3',cat:'frozen',name:{zh:'麻辣湯底',en:'Spicy Broth Base'},desc:{zh:'濃醇香辣，1人份',en:'Rich & spicy, serves 1'},price:7,unit:{zh:'份',en:'portion'},stock:false,emoji:'🌶️',imageUrl:''},
      {id:'4',cat:'fresh',name:{zh:'手工蔥油餅（現做）',en:'Scallion Pancake'},desc:{zh:'週六現做，外脆內軟',en:'Made Saturday, crispy outside'},price:5,unit:{zh:'片',en:'piece'},stock:true,emoji:'🫓',imageUrl:''},
      {id:'5',cat:'fresh',name:{zh:'台式滷肉飯套餐',en:'Braised Pork Rice Set'},desc:{zh:'滷肉飯＋滷蛋＋小菜',en:'Braised pork rice + egg + side'},price:9.5,unit:{zh:'份',en:'set'},stock:true,emoji:'🍱',imageUrl:''}
    ];
    showLoading(false);
    renderAll();
    return;
  }

  // Load products
  fetch(APPS_SCRIPT_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok && data.products) {
        products = data.products;
      }
      // Load discounts
      return fetch(APPS_SCRIPT_URL + '?action=getDiscounts');
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok && data.discounts) {
        VALID_CODES = data.discounts;
      }
      showLoading(false);
      renderAll();

    .catch(function(err){
      console.error('Failed to load data:', err);
      showLoading(false);
      renderAll();
    });
}

function showLoading(show) {
  var el = document.getElementById('loadingScreen');
  if(el) el.style.display = show ? 'flex' : 'none';
}

// ── Submit order to Google Sheet ─────────────────────────
function submitOrder(formData) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    // Demo mode - just show done
    goStep('done');
    return;
  }

  var isFr = hasFresh();
  var st = selStation ? ALL_STATIONS.find(function(s){ return s.id===selStation; }) : null;
  var days = availableDays(isFr);
  var dayObj = selDay ? days.find(function(d){ return d.key===selDay; }) : null;

  var orderItems = products
    .filter(function(p){ return (cart[p.id]||0)>0; })
    .map(function(p){ return { name_zh: p.name.zh, name_en: p.name.en, qty: cart[p.id], price: p.price }; });

  var s = sub(), f = fee(), total = tot();
  var discAmt = discountPct > 0 ? (s+f)*(discountPct/100) : 0;

  var payload = {
    action: 'submitOrder',
    name:         formData.name,
    phone:        formData.phone,
    email:        formData.email,
    whatsapp:     formData.whatsapp || '',
    address:      formData.address || '',
    items:        orderItems,
    subtotal:     s,
    shippingFee:  f,
    discountCode: discountCode || '',
    discountAmount: discAmt,
    total:        total,
    deliveryMode: dlvMode,
    collectionDay:  dayObj ? dayObj.label : '',
    stationName:  st ? st.name.zh : '',
    stationTime:  st ? st.time : '',
    last4Digits:  formData.last4,
  };

  // Show loading on button
  var btn = document.querySelector('#drawer-footer .btn-primary');
  if(btn) { btn.disabled = true; btn.textContent = lang==='zh' ? '送出中...' : 'Submitting...'; }

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.ok) {
      goStep('done');
    } else {
      alert(lang==='zh' ? '送出失敗，請稍後再試' : 'Submission failed, please try again');
      if(btn){ btn.disabled=false; btn.textContent=t('confirmPayment'); }
    }
  })
  .catch(function(){
    // Still go to done on network error (payment already made)
    goStep('done');
  });
}

loadData();
